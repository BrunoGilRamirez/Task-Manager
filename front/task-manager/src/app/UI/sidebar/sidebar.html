<button class="hamburger" type="button" aria-label="Open menu" (click)="toggleSidebar()">
  <span class="line"></span>
  <span class="line"></span>
  <span class="line"></span>
</button>

<div
  class="sidebar-overlay"
  [class.open]="isOpen()"
  (click)="closeSidebar()"
  aria-hidden="true"
></div>

<aside class="sidebar" [class.open]="isOpen()">
  <!-- Sidebar Header -->
  <div class="sidebar-header">
    <h3>Filters</h3>
    <button class="sidebar-close" type="button" aria-label="Close menu" (click)="closeSidebar()">
      &times;
    </button>
  </div>

  @if (mode() === 'container') {
    <!-- Filter Section -->
    <div class="filter-section">
      <div class="filter-group">
        <button
          class="filter-button"
          [class.filter-button--active]="selectedStatus() === 'all'"
          (click)="filterByStatus('all')"
        >
          <span class="filter-icon">●</span>
          All
          <span class="filter-count">{{ totalCount() }}</span>
        </button>
        <button
          class="filter-button"
          [class.filter-button--active]="selectedStatus() === 'pending'"
          (click)="filterByStatus('pending')"
        >
          <span class="filter-icon pending">●</span>
          In Progress
          <span class="filter-count">{{ pendingCount() }}</span>
        </button>
        <button
          class="filter-button"
          [class.filter-button--active]="selectedStatus() === 'completed'"
          (click)="filterByStatus('completed')"
        >
          <span class="filter-icon completed">●</span>
          Completed
          <span class="filter-count">{{ completedCount() }}</span>
        </button>
      </div>
    </div>
  } @else {
    <!-- Task List (for details view) -->
    <div class="task-list-sidebar">
      <h4 class="task-list-title">All tasks</h4>
      <div class="task-list-items">
        @if (tasks().length === 0) {
          <p class="task-list-empty">No tasks to display</p>
        } @else {
          @for (task of tasks(); track task.id) {
            <button class="task-item" (click)="navigateToTask(task.id)">
              <span class="task-item-title">{{ task.title }}</span>
            </button>
          }
        }
      </div>
    </div>
  }
</aside>
