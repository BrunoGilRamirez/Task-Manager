<article class="profile-card profile-card--security">
  <h3 class="card-title">Security</h3>
  <div class="security-grid">
    <div class="security-item">
      <div>
        <p class="security-title">Password</p>
        <p class="security-subtitle">Keep your account protected with a strong password.</p>
      </div>
      <button class="btn btn-secondary" type="button">Change password</button>
    </div>
    <div class="security-item">
      <div>
        <p class="security-title">Active sessions</p>
        <p class="security-subtitle">Review and sign out sessions on other devices.</p>
      </div>
      <button class="btn btn-outline" type="button">Manage sessions</button>
    </div>
  </div>
</article>
