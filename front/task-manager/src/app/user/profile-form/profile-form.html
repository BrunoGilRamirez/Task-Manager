<article class="profile-card">
  <h3 class="card-title">Personal information</h3>
  <form class="profile-form" [formGroup]="form" (submit)="saveChanges()">
    <div class="form-group">
      <label class="form-label required" for="profile-name">Name</label>
      <input
        id="profile-name"
        class="form-input"
        type="text"
        formControlName="name"
        placeholder="Your name"
      />
    </div>
    <div class="form-group">
      <label class="form-label" for="profile-email">Email</label>
      <input
        id="profile-email"
        class="form-input form-input--disabled"
        type="email"
        formControlName="email"
        placeholder="you@example.com"
      />
      <p class="form-hint">Email is managed by your authentication provider.</p>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" type="button" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid && form.touched">
        Save
      </button>
    </div>
  </form>
</article>
