<div class="task-form-container">
  <div class="task-form-content">
    <article class="task-form-card" [class.task-form-card--skeleton]="loading()">
      @if (loading()) {
        <div class="skeleton-line skeleton-line--title"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line skeleton-line--lg"></div>
        <div class="skeleton-line skeleton-line--lg"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-dates">
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
        </div>
        <div class="skeleton-actions">
          <div class="skeleton-button"></div>
          <div class="skeleton-button skeleton-button--primary"></div>
        </div>
      } @else {
        <h2 class="form-title">Edit task</h2>

        <form class="task-form" [formGroup]="form" (submit)="saveChanges()">
          <div class="form-group">
            <label for="taskId" class="form-label">Task ID</label>
            <input
              type="text"
              id="taskId"
              class="form-input form-input--disabled"
              [value]="task().id"
              disabled
              aria-readonly="true"
            />
            <p class="form-hint">The task ID cannot be modified</p>
          </div>

          <div class="form-group">
            <label for="title" class="form-label required">Title</label>
            <input
              type="text"
              id="title"
              class="form-control"
              formControlName="title"
              placeholder="Enter the task title"
            />
          </div>

          <div class="form-group">
            <label for="description" class="form-label">Description</label>
            <textarea
              id="description"
              class="form-textarea"
              formControlName="description"
              placeholder="Enter a detailed description of the task"
              rows="6"
            ></textarea>
          </div>

          <div class="form-group">
            <label for="completed" class="form-label">Status</label>
            <div class="form-checkbox-group">
              <input
                type="checkbox"
                id="completed"
                class="form-checkbox"
                formControlName="completed"
              />
              <label for="completed" class="form-checkbox-label"> Mark as completed </label>
            </div>
          </div>

          <div class="form-dates">
            <div class="form-group">
              <label for="createdAt" class="form-label">Created at</label>
              <input
                type="text"
                id="createdAt"
                class="form-input form-input--disabled"
                [value]="task().createdAt | date: 'medium'"
                disabled
                aria-readonly="true"
              />
            </div>
            <div class="form-group">
              <label for="updatedAt" class="form-label">Last updated</label>
              <input
                type="text"
                id="updatedAt"
                class="form-input form-input--disabled"
                [value]="task().updatedAt | date: 'medium'"
                disabled
                aria-readonly="true"
              />
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>

            <button type="submit" class="btn btn-primary" [disabled]="form.invalid && form.touched">
              Save changes
            </button>
          </div>
        </form>
      }
    </article>
  </div>
</div>
